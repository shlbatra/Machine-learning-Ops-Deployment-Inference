name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_BRANCH: ${{ github.head_ref || github.ref_name }}
      BUILD_COMMIT: ${{ github.sha }}
      PROJECT_ID: "deeplearning-sahil"
      LOCATION: "us"
      REPOSITORY: sahil-experiment-docker-images
      IMAGE_NAME: ml-pipelines-kfp-image
      FASTAPI_IMAGE_NAME: fastapi-ml-generic
      BEAM_IMAGE_NAME: dataflow-beam

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Sanitize ref name for Docker tag
        run: echo "IMAGE_TAG=$(echo '${{ github.head_ref || github.ref_name }}' | sed 's/[^a-zA-Z0-9._-]/-/g')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.LOCATION }}-docker.pkg.dev

      - name: Build ml_pipeline_kfp_image
        run: |
          docker build \
            --build-arg BUILD_BRANCH=${{ env.BUILD_BRANCH }} \
            --build-arg BUILD_COMMIT=${{ env.BUILD_COMMIT }} \
            --tag ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --file Dockerfile .

      - name: Push ml_pipeline_kfp_image
        run: |
          docker push ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Build FastAPI inference image
        run: |
          docker build \
            --build-arg BUILD_BRANCH=${{ env.BUILD_BRANCH }} \
            --build-arg BUILD_COMMIT=${{ env.BUILD_COMMIT }} \
            --tag ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FASTAPI_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FASTAPI_IMAGE_NAME }}:latest \
            --file Dockerfile.fastapi \
            .

      - name: Push FastAPI inference image
        run: |
          docker push ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FASTAPI_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.FASTAPI_IMAGE_NAME }}:latest

      - name: Build Beam SDK image for Dataflow
        run: |
          docker build \
            --tag ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BEAM_IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --tag ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BEAM_IMAGE_NAME }}:latest \
            --file Dockerfile.beam .

      - name: Push Beam SDK image
        run: |
          docker push ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BEAM_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.BEAM_IMAGE_NAME }}:latest

      - name: Get Composer DAGs bucket
        id: composer
        run: |
          DAGS_BUCKET=$(gcloud composer environments describe ml-pipelines-composer \
            --location us-central1 \
            --project ${{ env.PROJECT_ID }} \
            --format="value(config.dagGcsPrefix)")
          echo "dags_bucket=$DAGS_BUCKET" >> $GITHUB_OUTPUT

      - name: Sync DAGs to Composer
        run: |
          gcloud storage rsync dags/ ${{ steps.composer.outputs.dags_bucket }}/ --recursive --delete-unmatched-destination-objects
groups:
  - name: cloud-run-inference
    rules:
      - alert: HighCloudRunErrorRate
        expr: >
          sum(rate(stackdriver_cloud_run_revision_run_googleapis_com_container_request_count{response_code_class="5xx"}[5m]))
          /
          sum(rate(stackdriver_cloud_run_revision_run_googleapis_com_container_request_count[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Cloud Run 5xx error rate > 5% for 5 minutes"

      - alert: NoPredictionsFlowing
        expr: sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_prediction_success[10m])) == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Zero predictions in last 10 minutes — pipeline or FastAPI may be down"

      - alert: HighPredictionLatency
        expr: >
          sum(stackdriver_dataflow_job_custom_googleapis_com_dataflow_prediction_latency_ms_mean)
          > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Mean prediction latency exceeds 1 second"

  - name: dataflow-pipeline-errors
    rules:
      - alert: FeatureFetchFailureSpike
        expr: >
          sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_fetch_failure[5m]))
          + sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_fetch_retry[5m]))
          > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Feature fetch failures spiking — check Bigtable / online store"

      - alert: PredictionRetrySpike
        expr: >
          sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_prediction_retry[5m])) > 5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Prediction retries spiking — check FastAPI service health"

      - alert: ParseToFetchDropoff
        expr: >
          (sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_parse_success[5m]))
          - sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_fetch_success[5m])))
          /
          (sum(rate(stackdriver_dataflow_job_custom_googleapis_com_dataflow_parse_success[5m])) + 1)
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "More than 10% of parsed messages not reaching fetch — messages being dropped"

  - name: cost-attribution
    rules:
      - alert: DataflowWorkerCountSpike
        expr: >
          sum(stackdriver_dataflow_job_dataflow_googleapis_com_job_current_num_vcpus)
          > 2 * avg_over_time(sum(stackdriver_dataflow_job_dataflow_googleapis_com_job_current_num_vcpus)[7d:1h])
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Dataflow vCPU count exceeds 2x the 7-day average — check for autoscaling runaway"

      - alert: HighPubSubBacklog
        expr: >
          sum(stackdriver_pubsub_subscription_pubsub_googleapis_com_subscription_num_undelivered_messages) > 10000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pub/Sub undelivered messages > 10k — pipeline may be falling behind, driving up costs"

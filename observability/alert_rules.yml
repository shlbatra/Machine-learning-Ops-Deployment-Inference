groups:
  - name: fastapi-inference
    rules:
      - alert: HighPredictionErrorRate
        expr: >
          sum(rate(fastapi_fastapi_predictions_total{status="error"}[5m]))
          /
          sum(rate(fastapi_fastapi_predictions_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Prediction error rate > 5% for 5 minutes"

      - alert: NoPredictionsFlowing
        expr: sum(rate(fastapi_fastapi_predictions_total[10m])) == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Zero predictions in last 10 minutes — service may be down"

      - alert: HighPredictionLatency
        expr: >
          histogram_quantile(0.95,
            sum(rate(fastapi_fastapi_predict_duration_bucket[5m])) by (le)
          ) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 prediction latency exceeds 1 second"

  - name: dataflow-pipeline-errors
    rules:
      - alert: FeatureFetchFailureSpike
        expr: >
          sum(rate(dataflow_job_user_counter{metric_name=~"FetchFeaturesFromOnlineStore-fetch_failure|FetchFeaturesFromOnlineStore-fetch_missing_features"}[5m])) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Feature fetch failures spiking — check Bigtable / online store"

      - alert: HighParseErrorRate
        expr: >
          sum(rate(dataflow_job_user_counter{metric_name="ParsePubSubMessage-parse_error"}[5m]))
          /
          (sum(rate(dataflow_job_user_counter{metric_name="ParsePubSubMessage-parse_success"}[5m])) + 1)
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pub/Sub message parse error rate > 10%"

      - alert: PredictionBatchFailureSpike
        expr: >
          sum(rate(dataflow_job_user_counter{metric_name="BatchCallFastAPIService-prediction_error"}[5m])) > 5
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Prediction batch failures spiking — check FastAPI service health"

  - name: cost-attribution
    rules:
      - alert: DataflowWorkerCountSpike
        expr: >
          sum(stackdriver_dataflow_job_dataflow_googleapis_com_job_current_num_vcpus)
          > 2 * avg_over_time(sum(stackdriver_dataflow_job_dataflow_googleapis_com_job_current_num_vcpus)[7d:1h])
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Dataflow vCPU count exceeds 2x the 7-day average — check for autoscaling runaway"

      - alert: HighPubSubBacklog
        expr: >
          sum(stackdriver_pubsub_subscription_pubsub_googleapis_com_subscription_num_undelivered_messages) > 10000
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Pub/Sub undelivered messages > 10k — pipeline may be falling behind, driving up costs"
